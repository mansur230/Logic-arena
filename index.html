<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Logic Arena — New Month Challenge</title>
  <style>
    :root{
      --bg:#070709;
      --panel:#0f0f10;
      --muted:#9aa0a6;
      --accent:#ff2d55;
      --accent-2:#ffd24d;
      --glass: rgba(255,255,255,0.03);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    html,body{height:100%;background:linear-gradient(180deg,#050506 0%, #0b0b0c 100%);color:#fff;margin:0;padding:0}
    .app{max-width:460px;margin:0 auto;min-height:100vh;padding:16px;box-sizing:border-box;display:flex;flex-direction:column;gap:12px}
    .card{background:var(--panel);border-radius:12px;padding:14px;box-shadow:0 6px 24px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.03)}
    h1{font-size:20px;margin:0 0 6px 0}
    p{margin:6px 0;color:var(--muted);font-size:14px}
    .center{text-align:center}
    .input{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#fff;font-size:16px}
    .btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(90deg,var(--accent),#ff6b6b);color:#fff;border:0;font-weight:600;font-size:16px}
    .timer{font-size:28px;font-weight:700;color:var(--accent);text-align:center}
    .answers{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .choice{padding:12px;border-radius:10px;background:var(--glass);border:1px solid rgba(255,255,255,0.03);text-align:center;font-weight:600}
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Logic Arena — New Month Challenge</h1>
      <p>7 Questions • 60s each • No minimize • Fastest wins tie</p>
    </div>
  </div>
</body>
</html>
